<!DOCTYPE html>
<html lang="zh-CN" data-theme="">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logic Atlas · 系统关系地图</title>
<script type="application/json" id="atlas-model">__ATLAS_MODEL_JSON__</script>
<script type="application/json" id="atlas-meta">__ATLAS_META_JSON__</script>
<script type="application/json" id="atlas-lifecycle">__ATLAS_LIFECYCLE_JSON__</script>
<style>
:root{
  --bg:#ffffff; --surface:#f6f7f9; --surface-2:#eef0f3; --panel:#ffffff;
  --border:#e2e5ea; --border-strong:#cfd4dc;
  --text:#1c2024; --muted:#616a75; --faint:#8b939e;
  --accent:#2563eb; --accent-weak:#dbe6fe; --accent-text:#1d4ed8;
  --ok:#15803d; --ok-bg:#dcfce7; --warn:#b45309; --warn-bg:#fef3c7;
  --danger:#b91c1c; --danger-bg:#fee2e2; --neutral:#4b5563; --neutral-bg:#e5e7eb;
  --read:#0e7490; --write:#c2410c; --interact:#6d28d9;
  --shadow:0 1px 2px rgba(17,24,39,.06),0 2px 8px rgba(17,24,39,.06);
  --shadow-lg:0 8px 30px rgba(17,24,39,.14);
  --radius:10px; --radius-sm:6px;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0d1117; --surface:#12161d; --surface-2:#1b212b; --panel:#161b22;
    --border:#2a313c; --border-strong:#3a424f;
    --text:#e6edf3; --muted:#9aa4b1; --faint:#6b7480;
    --accent:#4c8dff; --accent-weak:#16233b; --accent-text:#8bb6ff;
    --ok:#3fb950; --ok-bg:#123021; --warn:#d29922; --warn-bg:#332810;
    --danger:#f85149; --danger-bg:#3a1618; --neutral:#9aa4b1; --neutral-bg:#232a34;
    --read:#38bdf8; --write:#fb923c; --interact:#a78bfa;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 2px 10px rgba(0,0,0,.35);
    --shadow-lg:0 10px 34px rgba(0,0,0,.55);
  }
}
:root[data-theme="light"]{
  --bg:#ffffff; --surface:#f6f7f9; --surface-2:#eef0f3; --panel:#ffffff;
  --border:#e2e5ea; --border-strong:#cfd4dc;
  --text:#1c2024; --muted:#616a75; --faint:#8b939e;
  --accent:#2563eb; --accent-weak:#dbe6fe; --accent-text:#1d4ed8;
  --ok:#15803d; --ok-bg:#dcfce7; --warn:#b45309; --warn-bg:#fef3c7;
  --danger:#b91c1c; --danger-bg:#fee2e2; --neutral:#4b5563; --neutral-bg:#e5e7eb;
  --read:#0e7490; --write:#c2410c; --interact:#6d28d9;
  --shadow:0 1px 2px rgba(17,24,39,.06),0 2px 8px rgba(17,24,39,.06);
  --shadow-lg:0 8px 30px rgba(17,24,39,.14);
}
:root[data-theme="dark"]{
  --bg:#0d1117; --surface:#12161d; --surface-2:#1b212b; --panel:#161b22;
  --border:#2a313c; --border-strong:#3a424f;
  --text:#e6edf3; --muted:#9aa4b1; --faint:#6b7480;
  --accent:#4c8dff; --accent-weak:#16233b; --accent-text:#8bb6ff;
  --ok:#3fb950; --ok-bg:#123021; --warn:#d29922; --warn-bg:#332810;
  --danger:#f85149; --danger-bg:#3a1618; --neutral:#9aa4b1; --neutral-bg:#232a34;
  --read:#38bdf8; --write:#fb923c; --interact:#a78bfa;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 2px 10px rgba(0,0,0,.35);
  --shadow-lg:0 10px 34px rgba(0,0,0,.55);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;font-size:inherit;color:inherit;cursor:pointer}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
a{color:var(--accent-text)}
.semantic-icon{width:16px;height:16px;display:inline-block;flex:none;color:var(--accent-text);vertical-align:-3px}
.semantic-icon *{vector-effect:non-scaling-stroke}
.icon-label{display:inline-flex;align-items:center;gap:6px}

/* layout */
.app{display:grid;grid-template-rows:auto 1fr;height:100vh}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-wrap:wrap}
.brand{font-weight:650;font-size:15px;letter-spacing:.2px;white-space:nowrap}
.brand .dot{color:var(--accent)}
.topmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1}
.chip{display:inline-flex;align-items:center;gap:6px;padding:2px 9px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:12px;color:var(--muted)}
.chip.mono{font-family:var(--mono);font-size:11.5px}
.chip.accent{background:var(--accent-weak);border-color:transparent;color:var(--accent-text)}
.chip.risk{background:var(--warn-bg);border-color:transparent;color:var(--warn)}
.self-note{font-size:12px;color:var(--faint)}
.topbtn{padding:5px 11px;border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-sm);color:var(--text)}
.topbtn:hover{border-color:var(--border-strong)}

.body{display:grid;grid-template-columns:280px 1fr;min-height:0}
.body.card-open{grid-template-columns:280px 1fr}
.sidebar{border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;min-height:0}
.search-wrap{padding:12px;border-bottom:1px solid var(--border);position:relative}
.search-input{width:100%;padding:8px 10px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--panel);color:var(--text)}
.search-input::placeholder{color:var(--faint)}
.results{position:absolute;left:12px;right:12px;top:52px;z-index:40;background:var(--panel);border:1px solid var(--border-strong);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);max-height:340px;overflow:auto}
.result{display:flex;gap:8px;align-items:baseline;padding:7px 10px;border-bottom:1px solid var(--border);width:100%;text-align:left;background:none;border-left:none;border-right:none;border-top:none}
.result:last-child{border-bottom:none}
.result:hover,.result.active{background:var(--accent-weak)}
.result .rtitle{font-weight:550;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.result .rkind{font-size:11px;color:var(--muted);flex:none}
.result .rsub{font-size:11px;color:var(--faint);flex:none;font-family:var(--mono)}

.mods{overflow:auto;padding:6px 0;flex:1;min-height:0}
.sys-group{padding:4px 0}
.sys-head{padding:8px 14px 4px;font-size:11px;font-weight:650;letter-spacing:.6px;text-transform:uppercase;color:var(--faint)}
.mod-row{display:flex;flex-direction:column;gap:3px;width:100%;text-align:left;padding:8px 14px;border:none;background:none;border-left:3px solid transparent}
.mod-row:hover{background:var(--surface-2)}
.mod-row.current{background:var(--accent-weak);border-left-color:var(--accent)}
.mod-row.muted .mod-title{color:var(--muted)}
.mod-title{font-weight:550;font-size:13px;display:flex;align-items:center;gap:6px}
.mod-sub{display:flex;gap:8px;align-items:center;font-size:11.5px;color:var(--muted)}
.badge{display:inline-flex;align-items:center;padding:0 6px;height:16px;border-radius:999px;font-size:10.5px;font-weight:600}
.badge.gap{background:var(--warn-bg);color:var(--warn)}
.badge.pend{background:var(--neutral-bg);color:var(--neutral)}
.badge.pend.solo{background:transparent;color:var(--faint);border:1px dashed var(--border-strong);font-weight:500}
.count-pill{font-family:var(--mono);font-size:11px;color:var(--muted)}

.main{display:flex;flex-direction:column;min-width:0;min-height:0;position:relative}
.main-head{display:flex;align-items:center;gap:12px;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--panel);flex-wrap:wrap}
.tabs{display:inline-flex;background:var(--surface-2);border-radius:var(--radius-sm);padding:2px;gap:2px}
.tab{padding:5px 12px;border:none;background:none;border-radius:5px;color:var(--muted);font-weight:550}
.tab.active{background:var(--panel);color:var(--text);box-shadow:var(--shadow)}
.crumbs{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);flex:1;flex-wrap:wrap}
.crumbs button{border:none;background:none;color:var(--accent-text);padding:0}
.crumbs .sep{color:var(--faint)}
.crumbs .cur{color:var(--text);font-weight:550}
.viewport{flex:1;position:relative;min-height:0;overflow:hidden;background:
  radial-gradient(circle at 1px 1px, var(--border) 1px, transparent 0) 0 0/22px 22px}
.stage-svg{width:100%;height:100%;display:block;touch-action:none}
.zoom-ctl{position:absolute;right:14px;bottom:14px;display:flex;flex-direction:column;gap:6px;z-index:20}
.zoom-ctl button{width:32px;height:32px;border:1px solid var(--border);background:var(--panel);border-radius:var(--radius-sm);box-shadow:var(--shadow);font-size:16px;line-height:1}
.legend{position:absolute;left:14px;bottom:14px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:11.5px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:5px;z-index:20}
.legend .lg{display:flex;align-items:center;gap:7px;color:var(--muted)}
.legend .swatch{width:20px;height:0;border-top-width:2px;border-top-style:solid}
.hint{position:absolute;left:50%;top:12px;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);border-radius:999px;padding:4px 12px;font-size:12px;color:var(--muted);box-shadow:var(--shadow);z-index:15}
.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);text-align:center;padding:24px}
.empty .big{font-size:15px;font-weight:600;color:var(--text)}

/* svg node styling via classes */
.n-card{cursor:pointer}
.n-card .nc-bg{fill:var(--panel);stroke:var(--border-strong);stroke-width:1.2;rx:10}
.n-card:hover .nc-bg{stroke:var(--accent)}
.n-card.selected .nc-bg{stroke:var(--accent);stroke-width:2.2;filter:drop-shadow(0 3px 8px rgba(0,0,0,.18))}
.n-card.dim{opacity:.28}
.n-card.pending .nc-bg{stroke-dasharray:5 4;fill:var(--surface)}
.nc-title{font-weight:600;font-size:13px;fill:var(--text)}
.nc-sub{font-size:11px;fill:var(--muted);font-family:var(--mono)}
.nc-tag{font-size:10.5px;fill:var(--faint)}
.n-card.structured .nc-bg{fill:var(--accent-weak)}
.nc-accent{fill:var(--accent)}
.nc-badge-bg{fill:var(--accent)}
.nc-badge-tx{fill:#ffffff;font-size:9px;font-weight:700;letter-spacing:.3px}
.n-card .semantic-icon,.n-focus .semantic-icon{color:var(--accent-text)}
.n-focus{cursor:pointer}
.n-focus .nf-bg{stroke-width:1.2}
.n-focus.page .nf-bg{fill:var(--accent-weak);stroke:var(--accent)}
.n-focus.data .nf-bg{fill:var(--surface);stroke:var(--border-strong)}
.n-focus.hub .nf-bg{fill:var(--panel);stroke:var(--interact);stroke-width:2}
.n-focus:hover .nf-bg{stroke:var(--accent)}
.n-focus.selected .nf-bg{stroke:var(--accent);stroke-width:2.4}
.n-focus.dim{opacity:.2}
.nf-label{font-size:11.5px;fill:var(--text)}
.nf-kind{font-size:9.5px;fill:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.edge{fill:none;cursor:pointer}
.edge.interacts{stroke:var(--interact);stroke-width:1.6}
.edge.reads{stroke:var(--read);stroke-width:1.5}
.edge.writes{stroke:var(--write);stroke-width:1.5;stroke-dasharray:6 4}
.edge.dim{opacity:.12}
.edge.hot{stroke-width:3}
.edge-hit{fill:none;stroke:transparent;stroke-width:14;cursor:pointer}
.col-head{font-size:11px;font-weight:650;letter-spacing:.5px;fill:var(--faint);text-transform:uppercase}
.module-data-gap{font-size:11px;fill:var(--warn);font-weight:600}
.module-data-gap-sub{font-size:10px;fill:var(--muted)}

.tooltip{position:absolute;z-index:60;max-width:320px;background:var(--panel);border:1px solid var(--border-strong);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);padding:9px 11px;font-size:12px;pointer-events:none;display:none}
.tooltip .tt-h{font-weight:600;margin-bottom:4px}
.tooltip .tt-row{color:var(--muted);margin-top:3px}
.tooltip .tt-row b{color:var(--text);font-weight:600}

/* card drawer */
.drawer{position:absolute;top:0;right:0;bottom:0;width:380px;max-width:92vw;background:var(--panel);border-left:1px solid var(--border);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateX(100%);z-index:50}
.drawer.open{transform:none}
.drawer-head{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border)}
.drawer-head .dt{flex:1;min-width:0}
.drawer-head .dt h3{margin:0 0 4px;font-size:16px;line-height:1.3}
.drawer-close{border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-sm);width:28px;height:28px;flex:none;font-size:15px;line-height:1}
.drawer-body{overflow:auto;padding:14px 16px;flex:1}
.sec{margin-bottom:16px}
.sec-h{font-size:11px;font-weight:650;letter-spacing:.5px;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
.kv{display:grid;grid-template-columns:88px 1fr;gap:4px 10px;font-size:13px}
.kv dt{color:var(--muted)}
.kv dd{margin:0}
.act-table{width:100%;border-collapse:collapse;font-size:12.5px}
.act-table th{text-align:left;font-size:11px;color:var(--faint);font-weight:600;padding:4px 6px;border-bottom:1px solid var(--border)}
.act-table td{padding:6px;border-bottom:1px solid var(--border);vertical-align:top;color:var(--text)}
.act-table td.a{color:var(--muted)}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.mchip{font-family:var(--mono);font-size:11px;padding:1px 7px;border-radius:999px;background:var(--accent-weak);color:var(--accent-text);border:none;cursor:pointer}
.mchip.oq{background:var(--warn-bg);color:var(--warn)}
.src{display:block;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;text-decoration:none;color:var(--text);background:var(--surface)}
.src:hover{border-color:var(--accent)}
.src .sp{font-family:var(--mono);font-size:11.5px;color:var(--accent-text);overflow-wrap:anywhere;word-break:normal}
.src .sa{font-size:11px;color:var(--muted);margin-top:2px}
.pill{display:inline-flex;align-items:center;gap:5px;padding:1px 9px;border-radius:999px;font-size:12px;font-weight:600}
.pill::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.9}
.st-active{background:var(--ok-bg);color:var(--ok)}
.st-withdrawn{background:var(--danger-bg);color:var(--danger)}
.st-superseded{background:var(--warn-bg);color:var(--warn)}
.st-proposed{background:var(--accent-weak);color:var(--accent-text)}
.st-unknown{background:var(--neutral-bg);color:var(--neutral)}

/* audit cockpit */
.audit-panel{overflow:auto;flex:1;min-height:0;padding:18px;background:var(--bg)}
.audit-hero{display:flex;align-items:flex-start;gap:18px;padding:16px 18px;margin-bottom:14px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.audit-hero h2{margin:0 0 4px;font-size:18px}.audit-hero p{margin:0;color:var(--muted);font-size:12.5px}
.audit-coverage{margin-left:auto;text-align:right;font-family:var(--mono);font-weight:700;color:var(--accent-text);white-space:nowrap}
.audit-coverage b{display:block;font-size:24px;color:var(--text)}.audit-coverage small{font-family:var(--sans);font-weight:500;color:var(--muted)}
.audit-grid{display:grid;grid-template-columns:minmax(420px,1.2fr) minmax(320px,.8fr);gap:14px}
.audit-section{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.audit-section-head{display:flex;align-items:center;gap:8px;padding:11px 13px;border-bottom:1px solid var(--border);background:var(--surface)}
.audit-section-head h3{margin:0;flex:1;font-size:13px}.audit-section-head span{font:11px var(--mono);color:var(--muted)}
.audit-module{display:grid;grid-template-columns:minmax(150px,1fr) auto auto;align-items:center;gap:10px;width:100%;padding:9px 12px;border:0;border-bottom:1px solid var(--border);background:none;text-align:left}
.audit-module:last-child{border-bottom:0}.audit-module:hover{background:var(--surface-2)}
.audit-module-name{display:flex;align-items:center;gap:7px;font-weight:600;min-width:0}
.audit-module-meta{font:11px var(--mono);color:var(--muted);white-space:nowrap}
.audit-health{display:inline-flex;align-items:center;gap:5px;font-size:11px;white-space:nowrap}
.audit-health::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}
.audit-health.good{color:var(--ok)}.audit-health.issue{color:var(--warn)}.audit-health.pending{color:var(--faint)}
.audit-gap{display:flex;gap:8px;padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px}
.audit-gap:last-child{border-bottom:0}.audit-gap button{border:0;background:none;padding:0;color:var(--accent-text);text-align:left}
.audit-gap-kind{flex:none;font:10.5px var(--mono);color:var(--warn)}
.unstructured-summary{border-top:1px solid var(--border);padding:10px 12px;color:var(--muted)}
.unstructured-summary summary{cursor:pointer;font-weight:600;color:var(--text)}
.unstructured-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}.unstructured-list button{border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-sm);padding:4px 7px;font-size:11px}
@media(max-width:980px){.audit-grid{grid-template-columns:1fr}.audit-module{grid-template-columns:minmax(130px,1fr) auto}.audit-module-meta{display:none}}

/* requirement index */
.panel{overflow:auto;flex:1;min-height:0;padding:16px}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.stat{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;box-shadow:var(--shadow);min-width:112px}
.stat .num{font-size:22px;font-weight:700;font-family:var(--mono)}
.stat .lab{font-size:11.5px;color:var(--muted);margin-top:2px}
.cov{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;box-shadow:var(--shadow)}
.cov .covh{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:8px}
.bar{height:9px;border-radius:999px;background:var(--surface-2);overflow:hidden}
.bar>span{display:block;height:100%;background:var(--accent);border-radius:999px}
.filter-row{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.filter-input{padding:7px 10px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--panel);color:var(--text);min-width:220px}
.toggle{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);cursor:pointer;user-select:none}
.grp{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;background:var(--panel)}
.grp-head{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surface);border-bottom:1px solid var(--border);font-weight:600;width:100%;text-align:left;border-left:none;border-right:none;border-top:none}
.grp-head .gc{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted)}
.grp-head .caret{font-size:11px;color:var(--faint);transition:none}
.rq-table{width:100%;border-collapse:collapse}
.rq-table td{padding:7px 14px;border-bottom:1px solid var(--border);font-size:13px}
.rq-table tr:last-child td{border-bottom:none}
.rq-table tr.hl td{background:var(--accent-weak)}
.rq-id{font-family:var(--mono);cursor:pointer;color:var(--accent-text);border:0;background:none;padding:0}
.rq-summary{min-width:260px;color:var(--text)}.rq-summary button{border:0;background:none;padding:0;text-align:left;width:100%;color:inherit}
.rq-refcount{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
.rq-src{color:var(--faint);font-size:11.5px;font-family:var(--mono);width:1%;white-space:nowrap}
.requirement-references{display:grid;gap:6px}
.workflow-role-source{display:block;max-width:108px;margin-top:5px;border:0;background:none;color:var(--accent-text);font:9.5px var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;padding:0}
.requirement-reference{display:flex;align-items:flex-start;gap:7px;width:100%;padding:7px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);text-align:left;font-size:11.5px}

function fitView(){

  var vp=$("view-graph"), W=vp.clientWidth||900, H=vp.clientHeight||600;
  var cw=contentBounds.w||1, ch=contentBounds.h||1;
  var k=Math.min(W/(cw+80), H/(ch+80), 1.4); if(!isFinite(k)||k<=0) k=1;

/* ---------- module layout (deterministic) ---------- */
function layoutModule(){

  var rwEdges=pageDataEdgesByScope[moduleScope]||[];

  }

  gRoot.appendChild(edgesLayer);gRoot.appendChild(nodeLayer);
  var pageWidth=190,dataWidth=220,nodeHeight=36,gap=14,top=48;
  var pageX=24,dataX=500,positions={};
  nodeLayer.appendChild(s("text",{class:"col-head",
    x:pageX+pageWidth/2,y:26,"text-anchor":"middle"},
    "页面 ("+pages.length+")"));

    "数据对象 ("+dataObjects.length+")"));

      cx:dataX+dataWidth/2,cy:y+nodeHeight/2
    };
    nodeLayer.appendChild(focusNode(
      node,"data",dataX,y,dataWidth,nodeHeight));
  });
  rwEdges.forEach(function(edge){
    var from=positions[edge.from],to=positions[edge.to];
    if(!from||!to) return;
    var sx=from.x+from.w,sy=from.cy,tx=to.x,ty=to.cy;
    var mid=(sx+tx)/2;
    var path="M"+sx+","+sy+" C"+mid+","+sy+" "+mid+","+ty+" "+tx+","+ty;
    var edgeGroup=s("g",{});
    edgeGroup.appendChild(s("path",{class:"edge "+edge.kind,
      "data-edge":edge.edgeId,d:path,

      click:function(event){event.stopPropagation();openEdgeCard(edge);},
      mouseenter:function(event){edgeTip(edge,event);},
      mousemove:moveTip,mouseleave:hideTip
    }}));

      "text-anchor":"middle"},"未声明页面 ↔ 数据读写"));

      "text-anchor":"middle"},"模块级读写不可下推到页面"));
  }
  var totalHeight=top+rows*(nodeHeight+gap)+24;

/* ---------- focus (adjacency highlight) ---------- */
function focusOn(id){ state.focusId=id; applyFocus(); }
function applyFocus(){
  var fid=state.focusId;
  var nodes=svg.querySelectorAll(".n-focus");
  var edges=svg.querySelectorAll(".edge");
  if(!fid){ nodes.forEach(function(n){n.classList.remove("dim");}); edges.forEach(function(e){e.classList.remove("dim","hot");}); return; }
  var neighbors={};neighbors[fid]=true;
  var rw=pageDataEdgesByScope[state.moduleId]||[];
  var incident={};
  rw.forEach(function(edge){
    if(edge.to===fid||edge.from===fid){
      incident[edge.edgeId]=true;
      neighbors[edge.to]=true;neighbors[edge.from]=true;
    }
  });
  if(!Object.keys(incident).length){
    nodes.forEach(function(node){node.classList.remove("dim");});
    edges.forEach(function(edge){edge.classList.remove("dim","hot");});
    return;
  }
  nodes.forEach(function(node){
    var nodeId=node.getAttribute("data-node");
    node.classList.toggle("dim",!neighbors[nodeId]);
  });
  edges.forEach(function(edge){
    var edgeId=edge.getAttribute("data-edge");
    edge.classList.toggle("dim",!incident[edgeId]);
    edge.classList.toggle("hot",!!incident[edgeId]);
  });
}

/* ---------- overview hover/focus highlight ---------- */

function ovHiEdge(edgeId){

  svg.querySelectorAll(".edge").forEach(function(el){

  });

    c.classList.toggle("dim", !keep[c.getAttribute("data-scope")]);
  });
}
function ovHiModule(scopeId){
  var inc=interactByScope[scopeId]||[], edgeSet={}, nbr={}; nbr[scopeId]=1;
  inc.forEach(function(e){ edgeSet[e.edgeId]=1; nbr[e.from]=1; nbr[e.to]=1; });

    var on=!!edgeSet[el.getAttribute("data-edge")];

function lifecycleKind(node,transitions){
  var incoming=false,outgoing=false;
  transitions.forEach(function(edge){
    if(edge.from===node.nodeId) outgoing=true;
    if(edge.to===node.nodeId) incoming=true;
  });
  if(outgoing&&!incoming) return "start";
  if(incoming&&!outgoing) return "terminal";
  return "active";
}
function stateGraphLayout(nodes,edges){
  var sorted=nodes.slice().sort(function(a,b){
    return String(a.title).localeCompare(String(b.title),"zh-CN");
  });
  var outgoing={},incoming={},rank={},queue=[];
  sorted.forEach(function(node){outgoing[node.nodeId]=[];incoming[node.nodeId]=[];});
  edges.forEach(function(edge){
    if(outgoing[edge.from]&&incoming[edge.to]){
      outgoing[edge.from].push(edge.to);incoming[edge.to].push(edge.from);
    }
  });
  sorted.forEach(function(node){
    if(!incoming[node.nodeId].length){rank[node.nodeId]=0;queue.push(node.nodeId);}
  });
  while(queue.length){
    var current=queue.shift(),nextRank=rank[current]+1;
    outgoing[current].slice().sort().forEach(function(target){
      if(rank[target]!=null) return;
      rank[target]=nextRank;queue.push(target);
    });
  }
  var maxRank=Math.max(0).valueOf();
  Object.keys(rank).forEach(function(id){maxRank=Math.max(maxRank,rank[id]);});
  sorted.forEach(function(node){
    if(rank[node.nodeId]==null){maxRank+=1;rank[node.nodeId]=maxRank;}
  });
  var columns={};
  sorted.forEach(function(node){
    var key=rank[node.nodeId];(columns[key]=columns[key]||[]).push(node);
  });
  var positions={},maxRows=1,nodeW=180,nodeH=72,colGap=70,rowGap=36;
  Object.keys(columns).sort(function(a,b){return Number(a)-Number(b);}).forEach(function(key){
    maxRows=Math.max(maxRows,columns[key].length);
    columns[key].forEach(function(node,row){
      positions[node.nodeId]={
        x:24+Number(key)*(nodeW+colGap),
        y:44+row*(nodeH+rowGap),w:nodeW,h:nodeH
      };
    });
  });
  return {
    positions:positions,
    width:Math.max(720,(maxRank+1)*(nodeW+colGap)+24),
    height:Math.max(250,44+maxRows*(nodeH+rowGap)+20)
  };
}
function stateGraphEdgePath(from,to,offset){
  var sx=from.x+from.w,sy=from.y+from.h/2+offset;
  var tx=to.x,ty=to.y+to.h/2+offset;
  if(from===to){
    return {d:"M"+sx+","+sy+" c50,-55 50,55 0,0",x:sx+34,y:sy-34};
  }
  if(tx>sx){
    var mx=(sx+tx)/2;
    return {d:"M"+sx+","+sy+" C"+mx+","+sy+" "+mx+","+ty+" "+tx+","+ty,
      x:mx,y:(sy+ty)/2-7};
  }
  var bx=Math.max(from.x,to.x)+Math.max(from.w,to.w)+48;
  return {d:"M"+sx+","+sy+" C"+bx+","+sy+" "+bx+","+ty+" "+(to.x+to.w)+","+ty,
    x:bx-4,y:(sy+ty)/2-7};
}
function importLifecycleSvg(svgText,machineId){
  if(typeof svgText!=="string"||!svgText) return null;
  var parsed=new DOMParser().parseFromString(svgText,"image/svg+xml");
  var root=parsed.documentElement;
  if(parsed.querySelector("parsererror")){
    /* Archify emits HTML-valid valueless data-* attributes; HTML parsing
       normalizes them before the same strict SVG sanitization below. */
    parsed=new DOMParser().parseFromString(svgText,"text/html");
    var svgRoots=parsed.querySelectorAll("svg");
    if(svgRoots.length!==1) return null;
    root=svgRoots[0];
  }
  if(!root||root.localName!=="svg"||
      root.namespaceURI!=="http://www.w3.org/2000/svg") return null;
  root.querySelectorAll("script,foreignObject,iframe,object,embed,image,a").forEach(
    function(node){ node.remove(); });
  root.querySelectorAll("*").forEach(function(node){
    Array.prototype.slice.call(node.attributes||[]).forEach(function(attr){
      var name=attr.name.toLowerCase(),value=attr.value.trim();
      if(name.indexOf("on")===0){
        node.removeAttribute(attr.name);return;
      }
      if((name==="href"||name==="xlink:href")&&value.charAt(0)!=="#"){
        node.removeAttribute(attr.name);return;
      }
      if(name==="style"&&value.indexOf("url(")>=0&&value.indexOf("url(#")<0){
        node.removeAttribute(attr.name);
      }
    });
  });
  var imported=document.importNode(root,true);
  imported.classList.add("archify-lifecycle-svg-root");
  imported.setAttribute("data-machine",machineId||"");
  var wrapper=h("div",{class:"archify-lifecycle-scroll"},
    h("div",{class:"archify-lifecycle-svg"}));
  wrapper.firstChild.appendChild(imported);
  return wrapper;
}

function renderStateGraph(nodes,edges,objectIndex){

  var canvas=h("div",{class:"state-graph-canvas",
    style:"min-width:"+layout.width+"px;height:"+layout.height+"px"});
  var svgEl=s("svg",{class:"state-graph-svg",width:layout.width,height:layout.height,
    viewBox:"0 0 "+layout.width+" "+layout.height,"aria-hidden":"true"});
  var markerId="state-arrow-"+objectIndex;
  var defs=s("defs",{}),marker=s("marker",{id:markerId,viewBox:"0 0 10 10",
    refX:"8.5",refY:"5",markerWidth:"8",markerHeight:"8",orient:"auto-start-reverse"});
  marker.appendChild(s("path",{d:"M0,0 L10,5 L0,10 z",fill:"var(--accent)"}));

      (detail.result?" → "+detail.result:"");
    if(relationGroups[key].labels.indexOf(label)<0){
      relationGroups[key].labels.push(label);

  });
  Object.keys(relationGroups).sort().forEach(function(key,edgeIndex){
    var relation=relationGroups[key];
    var from=layout.positions[relation.from],to=layout.positions[relation.to];
    if(!from||!to) return;
    var route=stateGraphEdgePath(from,to,(edgeIndex%2)*10);

      x:route.x,y:route.y+((edgeIndex%3)-1)*13,
      "text-anchor":"middle"},clip(fullLabel,34)));
  });

    var pos=layout.positions[node.nodeId],kind=lifecycleKind(node,edges);
    var labels={start:"无前置",active:"有进有出",terminal:"无后续"};

      h("span",{class:"state-graph-node-head"},semanticIcon(kind),
        h("b",{},node.title),h("span",{class:"state-kind"},kindLabel)),
      h("small",{},explicitTerminal?
        ("已声明终态"+(detail.terminalResult?" · "+detail.terminalResult:"")):
        detail.declaredAsTargetOnly?
          "未声明后续流转；不能判定为业务终态":
          (detail.meaning||detail.entryCondition||"状态详情"))));

/* ---------- search ---------- */
var searchIndex=buildSearchIndex();
function buildSearchIndex(){
  var idx=[];
  NODES.forEach(function(n){
    if(n.kind==="page") idx.push({type:"page",label:n.title,sub:scopeTitle(n.scopeId),node:n,scope:n.scopeId});
    else if(n.kind==="dataObject") idx.push({type:"data",label:n.title,sub:scopeTitle(n.scopeId),node:n,scope:n.scopeId});
    else if(n.kind==="requirement") idx.push({type:"req",label:n.title,
      sub:(n.detail||{}).summary||"未提供摘要",node:n});
    else if(n.kind==="flow"){
      var fc=(n.detail||{}).category;
      idx.push({type:fc==="boundary"?"boundary":fc==="stateImpact"?"stateImpact":
        fc==="interactionStep"?"interaction":"flow",
        label:n.title,sub:scopeTitle(n.scopeId)+" · "+fc,node:n,scope:n.scopeId});
    }else if(n.kind==="state"){
      var sc=(n.detail||{}).category;
      idx.push({type:sc==="pageState"?"pageState":"businessState",label:n.title,
        sub:scopeTitle(n.scopeId)+" · "+((n.detail||{}).object||(n.detail||{}).flowTitle||""),
        node:n,scope:n.scopeId});
    }
  });
  // OQ ids from sources
  var oqSeen={};
  EDGES.concat(NODES).forEach(function(x){
    arr(x.sources).forEach(function(sc){ arr(sc.oqIds).forEach(function(o){ if(!oqSeen[o]){ oqSeen[o]=1; idx.push({type:"oq",label:o,sub:"开放问题",oq:o}); } }); });
  });
  modules.forEach(function(m){ idx.push({type:"module",label:m.title,sub:m.scopeId,scope:m.scopeId}); });
  return idx;
}
function runSearch(q){
  q=(q||"").trim().toLowerCase();
  if(!q) return [];
  var out=[];
  for(var i=0;i<searchIndex.length&&out.length<40;i++){
    var it=searchIndex[i];
    var haystack=((it.label||"")+" "+(it.sub||"")).toLowerCase();
    if(haystack.indexOf(q)>=0) out.push(it);
  }
  // rank: exact-ish first
  out.sort(function(a,b){
    var la=(a.label||"").toLowerCase(), lb=(b.label||"").toLowerCase();
    return (la.indexOf(q))-(lb.indexOf(q));
  });
  return out;
}

    focusOn(it.node.nodeId); openNodeCard(it.node); applyFocus(); markSelected();
    var el=svg.querySelector('[data-node="'+cssEsc(it.node.nodeId)+'"]'); if(el&&el.focus) el.focus();
  }else if(it.type==="flow"||it.type==="interaction"||it.type==="stateImpact"||
           it.type==="businessState"||it.type==="pageState"||
           it.type==="boundary"){
    state.moduleId=it.scope;
    setView((it.type==="flow"||it.type==="interaction"||it.type==="stateImpact")?"flow":
      it.type==="businessState"?"state":"boundary");
    openNodeCard(it.node);
  }else if(it.type==="module"){
    openModule(it.scope);
  }else if(it.type==="req"){
    openRequirement(it.label);
  }else if(it.type==="oq"){
    // find node/edge referencing this oq
    var owner=null;
    NODES.concat(EDGES).some(function(x){ return arr(x.sources).some(function(sc){ if(arr(sc.oqIds).indexOf(it.oq)>=0){ owner=x; return true; } return false; }); });
    if(owner){ if(owner.nodeId) openNodeCard(owner); else openEdgeCard(owner); }
  }
}
function hideResults(){ curResults=[]; activeRes=-1; resultsEl.hidden=true; searchEl.setAttribute("aria-expanded","false"); }
searchEl.addEventListener("input",function(){ curResults=runSearch(this.value); activeRes=curResults.length?0:-1; renderResults(); });
searchEl.addEventListener("keydown",function(e){
  if(e.key==="ArrowDown"){ e.preventDefault(); if(curResults.length){ activeRes=Math.min(curResults.length-1,activeRes+1); renderResults(); } }
  else if(e.key==="ArrowUp"){ e.preventDefault(); if(curResults.length){ activeRes=Math.max(0,activeRes-1); renderResults(); } }
  else if(e.key==="Enter"){ if(activeRes>=0&&curResults[activeRes]) chooseResult(curResults[activeRes]); }
  else if(e.key==="Escape"){ hideResults(); }
});
document.addEventListener("click",function(e){ if(!e.target.closest(".search-wrap")) hideResults(); });

/* ---------- global keyboard ---------- */
document.addEventListener("keydown",function(e){
  if(e.key!=="Escape") return;
  if(!resultsEl.hidden){ hideResults(); return; }
  if(drawer.classList.contains("open")){ closeDrawer(); return; }
  if(state.view==="graph"&&state.focusId){ state.focusId=null; applyFocus(); return; }
  if(state.view==="graph"&&state.level==="module"){ backToOverview(); return; }
});

/* ---------- utils ---------- */
function clip(str,n){ str=(str==null?"":String(str)); return str.length>n?str.slice(0,n-1)+"…":str; }
function cssEsc(v){ if(window.CSS&&CSS.escape) return CSS.escape(v); return String(v).replace(/["\\\]]/g,"\\$&"); }

/* ---------- init ---------- */
window.addEventListener("resize",function(){
  if(state.view==="graph"&&contentBounds) fitView();
  if(state.view==="flow") drawWorkflowLinks($("view-flow"));
});
setView("audit");

})();
</script>
