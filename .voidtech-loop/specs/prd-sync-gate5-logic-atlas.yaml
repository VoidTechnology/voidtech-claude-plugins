    cwd: plugins/voidtech-core/skills/prd-from-requirements/tests
    timeout_seconds: 900
manual_review:
  - logic-atlas.md / .html 的阅读体验与信息编排（fixture 只验证结构与自述,呈现质量属人工判断）
  - 浏览器级验证与渲染器验证证明的 CI 接线（ADR-0005 §8,属插件 CI 范围,本门只交付继承判定纯函数）
