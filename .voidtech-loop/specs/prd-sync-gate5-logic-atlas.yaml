schema_version: 1
goal_id: prd-sync-gate5-logic-atlas
task: "实现 plugins/voidtech-core/skills/prd-from-requirements/scripts/prdsync/atlas.py：Logic Atlas 确定性编译器与分层内容门。compile（只消费模块 prd.md 三张机器可解析表——表头见 templates/module-prd.md 的 3.4/5.0/7.0 节——与 _generated/requirements-ledger.jsonl，输出过 schemas/logic-model.schema.json，缺失结构进 gaps 不补齐，读取栅栏先行）、build_plan（markdown 阶段四件套 + html 阶段自包含 logic-atlas.html，manifest 含三摘要，视图自述快照短哈希）、publish（经 operation_engine maintain operation 提交，校验失败 AtlasValidationError 零写入）、check_freshness（严格只读，三摘要比对，pending 不参与）、gate_requirements（legacy/markdown/html/polish 四阶段步骤裁剪，步骤 id 与阻塞性见 fixture docstring）、proof_inherits（七键继承纯函数）。接口契约固化在 tests/test_gate5_atlas.py 与 tests/test_gate5_proof_perf.py 的模块 docstring。设计见 docs/decisions/0005-logic-atlas-read-model.md 与技术设计 §10。性能门：Example 工作树 compile+build_plan < 5s。复用 prdsync 既有模块（base_cas 的摘要函数、effective_view 读取栅栏、engine 发布协议），只使用 Python 标准库；不得修改 tests/、schemas/、docs/、templates/。门 2/3/4 既有测试保持全绿。"
