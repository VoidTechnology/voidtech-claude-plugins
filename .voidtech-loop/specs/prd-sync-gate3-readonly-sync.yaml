schema_version: 1
goal_id: prd-sync-gate3-readonly-sync
task: "实现 plugins/voidtech-core/skills/prd-from-requirements/scripts/prdsync/sync.py：只读同步（不可变 revision 导入、规范化哈希 no-op、raw diff、observed/pending 游标）与 rebaseline（§8.2 六步：契约摘要触发、同一原始文件重建 baseline、crosswalk 身份继承、appliedRevision 推进、重同步零业务变更）。接口契约固化在 tests/test_gate3_sync.py 与 tests/test_gate3_rebaseline.py 的模块 docstring。注意：migration.py 的 revision 0 生成必须重构为与 sync 共用同一 normalizer，满足规范化契约（normalized.jsonl 不含 requirementId、recordKey 仅由业务列内容计算、revision-manifest 与 normalization-manifest 过 schema）——门 2 既有测试必须保持全绿。设计见 docs/tech-design-prd-sync-and-logic-atlas-2026-07-21.md §3.4/§3.5/§8.2 与 docs/decisions/0004 §2/§3/§6。复用 prdsync 既有模块，经 operation_engine 提交 rebaseline operation（operationKind=rebaseline），只使用 Python 标准库；不得修改 tests/、schemas/、docs/。"
