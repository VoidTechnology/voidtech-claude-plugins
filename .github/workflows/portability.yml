name: Portability

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.22.0

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes jq ripgrep
          npm install --global @anthropic-ai/claude-code@2.1.186

      - name: Validate portability
        run: scripts/check-portability.sh --install-smoke
